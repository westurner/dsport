name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - run: git config --global core.checkRoundtrip false
        working-directory: .
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
      - run: cargo +nightly fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - run: git config --global core.checkRoundtrip false
        working-directory: .
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
      - run: python -m venv .venv
      - run: ${{ github.workspace }}/src/.venv/bin/python -m pip install maturin pytest
      - run: ${{ github.workspace }}/src/.venv/bin/maturin develop --release
        working-directory: src/docutilsrs
      - run: ${{ github.workspace }}/src/.venv/bin/maturin develop --release
        working-directory: src/sphinxdocrs
      - run: ${{ github.workspace }}/src/.venv/bin/pytest tests/ -q
