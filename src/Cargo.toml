[workspace]
resolver = "2"
members = [
    "docutilsrs",
    "mathrenderrs",
    "myst-md-rs",
    "pygmentsrs",
    "sphinxdocrs",
]
# RaTeX is a vendored sibling workspace (per AGENTS.md, do not modify).
# Excluding it lets our member crates depend on its packages via path
# without cargo trying to fold the RaTeX workspace into ours and
# clobbering its `[workspace.package]` inheritance (edition 2021,
# version 0.1.9, MIT license).
exclude = [
    "RaTeX",
    "docutils",
    "sphinx",
    "jinja2",
    "markdown-it-py",
    "minijinja",
    "MyST-Parser",
    "pygments",
    "tests",
]

[workspace.package]
edition = "2024"
license = "BSD-2-Clause"
rust-version = "1.85"

[workspace.dependencies]
pyo3 = "0.28.3"
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5"
insta = { version = "1.47", features = ["yaml"] }

[profile.release]
lto = "thin"
codegen-units = 1
